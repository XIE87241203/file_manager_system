<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="video_player.title"></title>
    <!-- 引入公用样式 -->
    <link rel="stylesheet" href="../common/common.css">
    <link rel="stylesheet" href="../common/header_toolbar/default/default_header_toolbar.css">
    <!-- 引入页面私有样式 -->
    <link rel="stylesheet" href="video_player.css">
</head>
<body class="player-body">

    <main class="player-container main-content">

        <div id="artplayer-container" class="artplayer-app"></div>

    <script src="../common/i18n/i18n_utils.js"></script>

    <script src="../common/common.js"></script>
    <script src="../common/ui_components.js"></script>
    <script src="../common/request.js"></script>
    <script src="../common/toast.js"></script>
    <script src="../common/header_toolbar/default/default_header_toolbar.js"></script>
