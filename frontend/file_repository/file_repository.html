<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="file_repo.title"></title>
    <!-- 引入公用样式 -->
    <link rel="stylesheet" href="../common/common.css">
    <link rel="stylesheet" href="../common/table.css">
    <!-- 引入分页组件样式 -->
    <link rel="stylesheet" href="../common/page_bar/page_bar.css">
    <!-- 引入顶部工具栏样式 -->
    <link rel="stylesheet" href="../common/header_toolbar/search/search_header_toolbar.css">
    <!-- 引入页面私有样式 -->
    <link rel="stylesheet" href="file_repository.css">
</head>
<body>
    <!-- 顶部工具栏：由 SearchHeaderToolbar 动态初始化 -->
    <header class="header-bar"></header>

    <main class="main-content">
        <!-- 主内容区域：在扫描时会整体隐藏 -->
        <div id="repo-main-content" class="repo-content-group">
            <!-- 数据展示区：自适应表格 -->
            <div class="table-wrapper">
                <table id="file-table" class="file-table file-repository-table">
                    <thead>
                        <tr>
                            <th class="sortable col-file-name" data-field="file_name">
                                <span data-i18n="file_repo.col_name"></span> <span class="sort-icon"></span>
                            </th>
                            <th class="sortable col-size" data-field="file_size">
                                <span data-i18n="file_repo.col_size"></span> <span class="sort-icon"></span>
                            </th>
                            <th class="sortable col-path" data-field="file_path">
                                <span data-i18n="file_repo.col_path"></span> <span class="sort-icon"></span>
                            </th>
                            <th class="col-type">
                                <div class="filter-header">
                                    <span data-i18n="file_repo.col_type"></span>
                                    <select id="filter-file-type" class="filter-select">
                                        <option value="">All</option>
                                        <option value="video">Video</option>
                                        <option value="image">Image</option>
                                        <option value="other">Other</option>
                                    </select>
                                </div>
                            </th>
                            <th class="sortable col-duration" data-field="video_duration">
                                <span data-i18n="file_repo.col_duration"></span> <span class="sort-icon"></span>
                            </th>
                            <th class="sortable col-codec" data-field="video_codec">
                                <span data-i18n="file_repo.col_codec"></span> <span class="sort-icon"></span>
                            </th>
                            <th class="sortable col-time" data-field="scan_time" id="col-time-header">
                                <span data-i18n="file_repo.col_time"></span> <span class="sort-icon"></span>
                            </th>
                            <th class="col-check">
                                <input type="checkbox" id="select-all-checkbox" class="select-all-checkbox">
                            </th>
                        </tr>
                    </thead>
                    <tbody id="file-list-body">
                        <!-- 数据行由 JS 动态生成 -->
                    </tbody>
                </table>
            </div>

            <!-- 底部导航区：分页控制 -->
            <footer class="footer-bar">
                <div class="footer-left">
                    <!-- 缩略图生成按钮已移至菜单 -->
                </div>
                <div class="footer-center">
                    <div id="pagination-container" class="pagination-container">
                        <!-- 由 PageBar 自动生成 -->
                    </div>
                </div>
                <div class="footer-right">
                    <button id="btn-delete-selected" class="btn-delete-icon hidden">
                        <span class="trash-icon"></span>
                    </button>
                </div>
            </footer>
        </div>
    </main>

    <!-- 脚本加载 -->
    <script src="../common/i18n/zh.js"></script>
    <script src="../common/i18n/en.js"></script>
    <script src="../common/i18n/i18n_utils.js"></script>
    <script src="../common/common.js"></script>
    <script src="../common/ui_components.js"></script>
    <script src="../common/request.js"></script>
    <script src="../common/toast.js"></script>
    <!-- 引入分页组件脚本 -->
    <script src="../common/page_bar/page_bar.js"></script>
    <!-- 引入顶部工具栏组件 -->
    <script src="../common/header_toolbar/search/search_header_toolbar.js"></script>
    <!-- 引入页面私有请求封装 -->
    <script src="file_repository_request.js"></script>
    <script src="file_repository.js"></script>
</body>
</html>
