<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="duplicate_check.title"></title>
    <!-- 引入公用样式 -->
    <link rel="stylesheet" href="../../common/common.css">
    <link rel="stylesheet" href="../../common/table.css">
    <!-- 引入分页组件样式 -->
    <link rel="stylesheet" href="../../common/page_bar/page_bar.css">
    <!-- 引入顶部工具栏样式 -->
    <link rel="stylesheet" href="../../common/header_toolbar/default/default_header_toolbar.css">
    <!-- 引入页面私有样式 -->
    <link rel="stylesheet" href="duplicate_check.css">
</head>
<body>
    <!-- 公用顶部工具栏 -->
    <header class="header-bar"></header>

    <main class="main-content">
        <!-- 查重状态容器 -->
        <div id="scanning-container" class="centered-status-container hidden"></div>

        <!-- 结果区域组 -->
        <div id="results-group" class="results-group hidden">
            <!-- 结果统计标题栏 -->
            <div id="results-summary-bar" class="summary-bar hidden">
                <div class="summary-content">
                    <!-- 重复类型筛选 -->
                    <div class="filter-item">
                        <label for="filter-similarity-type" data-i18n="duplicate_check.filter_type"></label>
                        <select id="filter-similarity-type" class="common-select">
                            <option value="" data-i18n="duplicate_check.filter_all"></option>
                            <option value="md5" data-i18n="duplicate_check.filter_md5"></option>
                            <option value="hash" data-i18n="duplicate_check.filter_image"></option>
                            <option value="video_feature" data-i18n="duplicate_check.filter_video"></option>
                        </select>
                    </div>
                    <span class="summary-divider">|</span>
                    <div class="summary-stats">
                        <span id="summary-groups"></span>
                        <span id="summary-time"></span>
                    </div>
                </div>
            </div>

            <!-- 结果显示区域 -->
            <div id="results-wrapper" class="results-wrapper"></div>

            <!-- 底部导航与操作区 (参考 file_repository.html 统一布局) -->
            <footer class="footer-bar">
                <div class="footer-left"></div>
                <div class="footer-center">
                    <div id="pagination-container" class="pagination-container">
                        <!-- 由 PageBar 自动生成 -->
                    </div>
                </div>
                <div class="footer-right">
                    <button id="btn-delete-selected-global" class="btn-delete-icon hidden">
                        <span class="trash-icon"></span>
                    </button>
                </div>
            </footer>
        </div>

        <!-- 初始引导提示 -->
        <div id="empty-hint" class="empty-hint" data-i18n="duplicate_check.start_hint">
        </div>
    </main>

    <!-- 脚本加载 -->
    <script src="../../common/i18n/zh.js"></script>
    <script src="../../common/i18n/en.js"></script>
    <script src="../../common/i18n/i18n_utils.js"></script>
    <script src="../../common/common.js"></script>
    <script src="../../common/ui_components.js"></script>
    <script src="../../common/request.js"></script>
    <script src="../../common/toast.js"></script>
    <!-- 引入分页组件脚本 -->
    <script src="../../common/page_bar/page_bar.js"></script>
    <!-- 引入顶部工具栏组件 -->
    <script src="../../common/header_toolbar/default/default_header_toolbar.js"></script>
    <script src="duplicate_check_request.js"></script>
    <script src="duplicate_check.js"></script>
</body>
</html>
