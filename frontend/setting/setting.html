<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="setting.title"></title>
    <link rel="stylesheet" href="../common/common.css">
    <link rel="stylesheet" href="../common/header_toolbar/default/default_header_toolbar.css">
    <link rel="stylesheet" href="../common/widget/progress_button.css">
    <link rel="stylesheet" href="setting.css">
</head>
<body>
<!-- 顶部工具栏容器，由 default_header_toolbar.js 动态初始化 -->
<header class="header-bar"></header>

<main class="main-content">
    <!-- 选项卡导航 -->
    <div class="tabs">
        <button id="tab-repo" class="tab-btn active" data-i18n="setting.tabs.repo"></button>
        <button id="tab-file-entry" class="tab-btn" data-i18n="setting.tabs.file_entry"></button>
        <button id="tab-dup-check" class="tab-btn" data-i18n="setting.tabs.dup_check"></button>
        <button id="tab-maintenance" class="tab-btn" data-i18n="setting.tabs.maintenance"></button>
        <button id="tab-account" class="tab-btn" data-i18n="setting.tabs.account"></button>
    </div>

    <!-- 文件仓库分页 -->
    <div id="content-repo" class="tab-content active">
        <div class="settings-grid">
            <div>
                <div class="section-header mt-0">
                    <h3 data-i18n="setting.repo.repo_dir"></h3>
                    <button id="add-repo-btn" class="btn-primary btn-add-small" data-i18n="setting.repo.add_repo"></button>
                </div>
                <div class="repo-list" id="repo-list">
                    <!-- 动态生成仓库列表 -->
                </div>
            </div>

            <div class="form-group">
                <label class="label-text" for="scan-suffixes" data-i18n="setting.repo.scan_suffixes"></label>
                <input type="text" id="scan-suffixes" class="input-field" placeholder="" data-i18n-placeholder="setting.repo.scan_suffixes_placeholder" autocomplete="off">
                <small class="form-hint" data-i18n="setting.repo.scan_suffixes_hint"></small>
            </div>

            <div class="form-group">
                <label class="label-text" for="thumbnail-size" data-i18n="setting.repo.thumbnail_size"></label>
                <input type="number" id="thumbnail-size" class="input-field" placeholder="" data-i18n-placeholder="setting.repo.thumbnail_size_placeholder">
                <small class="form-hint" data-i18n="setting.repo.thumbnail_size_hint"></small>
            </div>

            <!-- 功能开关组 -->
            <div class="full-width checkbox-options-group form-group">
                <div class="checkbox-item">
                    <input type="checkbox" id="quick-view-thumbnail" class="checkbox-field">
                    <label class="label-text" for="quick-view-thumbnail" data-i18n="setting.repo.quick_view"></label>
                </div>

                <div class="checkbox-item">
                    <input type="checkbox" id="ignore-filenames-case-insensitive" class="checkbox-field">
                    <label class="label-text" for="ignore-filenames-case-insensitive" data-i18n="setting.repo.ignore_filename_case"></label>
                </div>

                <div class="checkbox-item">
                    <input type="checkbox" id="ignore-paths-case-insensitive" class="checkbox-field">
                    <label class="label-text" for="ignore-paths-case-insensitive" data-i18n="setting.repo.ignore_path_case"></label>
                </div>
            </div>

            <!-- 自动刷新配置（合并到一行） -->
            <div class="full-width checkbox-options-group form-group auto-refresh-config">
                <div class="checkbox-item">
                    <input type="checkbox" id="auto-refresh-enabled" class="checkbox-field">
                    <label class="label-text" for="auto-refresh-enabled" data-i18n="setting.repo.auto_refresh"></label>
                </div>
                <div class="time-setting-item">
                    <label class="label-text" for="auto-refresh-time" data-i18n="setting.repo.refresh_time"></label>
                    <input type="time" id="auto-refresh-time" class="input-field input-inline">
                    <small class="form-hint mt-0" data-i18n="setting.repo.refresh_time_hint"></small>
                </div>
            </div>

            <div class="form-group">
                <label class="label-text" for="ignore-filenames" data-i18n="setting.repo.ignore_filenames"></label>
                <input type="text" id="ignore-filenames" class="input-field" placeholder="" data-i18n-placeholder="setting.repo.ignore_filenames_placeholder" autocomplete="off">
                <small class="form-hint" data-i18n="setting.repo.ignore_filenames_hint"></small>
            </div>

            <div class="form-group">
                <label class="label-text" for="ignore-paths" data-i18n="setting.repo.ignore_paths"></label>
                <input type="text" id="ignore-paths" class="input-field" placeholder="" data-i18n-placeholder="setting.repo.ignore_paths_placeholder" autocomplete="off">
                <small class="form-hint" data-i18n="setting.repo.ignore_paths_hint"></small>
            </div>

            <div class="form-group">
                <label class="label-text" for="search-replace-chars" data-i18n="setting.repo.search_replace"></label>
                <input type="text" id="search-replace-chars" class="input-field" placeholder="" data-i18n-placeholder="setting.repo.search_replace_placeholder" autocomplete="off">
                <small class="form-hint" data-i18n="setting.repo.search_replace_hint"></small>
            </div>
        </div>
    </div>

    <!-- 文件录入管理分页 -->
    <div id="content-file-entry" class="tab-content">
        <div class="settings-grid">
            <div class="full-width">
                <h3 class="mt-0" data-i18n="setting.file_entry.title"></h3>
            </div>
            <div class="form-group">
                <label class="label-text" for="file-name-link-prefix" data-i18n="setting.file_entry.link_prefix"></label>
                <input type="text" id="file-name-link-prefix" class="input-field" placeholder="" data-i18n-placeholder="setting.file_entry.link_prefix_placeholder" autocomplete="off">
                <small class="form-hint" data-i18n="setting.file_entry.link_prefix_hint"></small>
            </div>
        </div>
    </div>

    <!-- 查重设置分页 -->
    <div id="content-dup-check" class="tab-content">
        <div class="settings-grid">
            <div class="full-width">
                <h3 class="mt-0" data-i18n="setting.dup_check.image_title"></h3>
            </div>
            <div class="form-group">
                <label class="label-text" for="image-threshold" data-i18n="setting.dup_check.image_threshold"></label>
                <input type="number" id="image-threshold" class="input-field" placeholder="" data-i18n-placeholder="setting.dup_check.image_threshold_placeholder">
                <small class="form-hint" data-i18n="setting.dup_check.image_threshold_hint"></small>
            </div>

            <div class="full-width">
                <h3 class="mt-0" data-i18n="setting.dup_check.video_title"></h3>
            </div>
            <div class="form-group">
                <label class="label-text" for="video-interval-seconds" data-i18n="setting.dup_check.video_interval"></label>
                <input type="number" id="video-interval-seconds" class="input-field" placeholder="" data-i18n-placeholder="setting.dup_check.video_interval_placeholder">
                <small class="form-hint" data-i18n="setting.dup_check.video_interval_hint"></small>
            </div>
            <div class="form-group">
                <div class="checkbox-item">
                    <input type="checkbox" id="video-backwards" class="checkbox-field">
                    <label class="label-text" for="video-backwards" data-i18n="setting.dup_check.video_backwards"></label>
                </div>
                <small class="form-hint" data-i18n="setting.dup_check.video_backwards_hint"></small>
            </div>
            <div class="form-group">
                <label class="label-text" for="video-frame-similar-distance" data-i18n="setting.dup_check.video_frame_distance"></label>
                <input type="number" id="video-frame-similar-distance" class="input-field" placeholder="" data-i18n-placeholder="setting.dup_check.video_frame_distance_placeholder">
                <small class="form-hint" data-i18n="setting.dup_check.video_frame_distance_hint"></small>
            </div>
            <div class="form-group">
                <label class="label-text" for="video-frame-similarity-rate" data-i18n="setting.dup_check.video_frame_rate"></label>
                <input type="number" id="video-frame-similarity-rate" class="input-field" step="0.1" placeholder="" data-i18n-placeholder="setting.dup_check.video_frame_rate_placeholder">
                <small class="form-hint" data-i18n="setting.dup_check.video_frame_rate_hint"></small>
            </div>
            <div class="form-group">
                <label class="label-text" for="video-max-duration-diff-ratio" data-i18n="setting.dup_check.video_duration_ratio"></label>
                <input type="number" id="video-max-duration-diff-ratio" class="input-field" step="0.1" placeholder="" data-i18n-placeholder="setting.dup_check.video_duration_ratio_placeholder">
                <small class="form-hint" data-i18n="setting.dup_check.video_duration_ratio_hint"></small>
            </div>
        </div>
    </div>

    <!-- 数据维护分页 -->
    <div id="content-maintenance" class="tab-content">
        <div class="settings-grid">
            <div class="full-width">
                <h3 class="mt-0" data-i18n="setting.maintenance.sync_title"></h3>
                <p class="form-hint mb-20" data-i18n="setting.maintenance.sync_hint"></p>
            </div>

            <div class="full-width mb-20">
                <div class="maintenance-item">
                    <div class="maintenance-info">
                        <span class="maintenance-title" data-i18n="setting.maintenance.sync_thumb"></span>
                        <span class="maintenance-desc" data-i18n="setting.maintenance.sync_thumb_desc"></span>
                    </div>
                    <div id="sync-thumbnail-btn-container" class="sync-btn-container"></div>
                </div>
            </div>

            <div class="full-width">
                <h3 class="mt-0" data-i18n="setting.maintenance.danger_title"></h3>
                <p class="form-hint mb-20" data-i18n="setting.maintenance.danger_hint"></p>
            </div>

            <div class="full-width button-group">
                <div class="flex-column gap-15">
                    <div class="maintenance-item">
                        <div class="maintenance-info">
                            <span class="maintenance-title" data-i18n="setting.maintenance.clear_already_entered"></span>
                            <span class="maintenance-desc" data-i18n="setting.maintenance.clear_already_entered_desc"></span>
                        </div>
                        <button id="clear-already-entered-btn" class="btn-danger" data-i18n="setting.maintenance.clear_btn"></button>
                    </div>

                    <div class="maintenance-item">
                        <div class="maintenance-info">
                            <span class="maintenance-title" data-i18n="setting.maintenance.clear_pending_entry"></span>
                            <span class="maintenance-desc" data-i18n="setting.maintenance.clear_pending_entry_desc"></span>
                        </div>
                        <button id="clear-pending-entry-btn" class="btn-danger" data-i18n="setting.maintenance.clear_btn"></button>
                    </div>

                    <div class="maintenance-item">
                        <div class="maintenance-info">
                            <span class="maintenance-title" data-i18n="setting.maintenance.clear_history"></span>
                            <span class="maintenance-desc" data-i18n="setting.maintenance.clear_history_desc"></span>
                        </div>
                        <button id="clear-history-btn" class="btn-danger" data-i18n="setting.maintenance.clear_btn"></button>
                    </div>

                    <div class="maintenance-item">
                        <div class="maintenance-info">
                            <span class="maintenance-title" data-i18n="setting.maintenance.clear_video"></span>
                            <span class="maintenance-desc" data-i18n="setting.maintenance.clear_video_desc"></span>
                        </div>
                        <button id="clear-video-btn" class="btn-danger" data-i18n="setting.maintenance.clear_btn"></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 账户与系统分页 -->
    <div id="content-account" class="tab-content">
        <div id="setting-form" class="settings-grid">
            <div class="full-width">
                <h3 class="mt-0" data-i18n="setting.account.basic_title"></h3>
            </div>
            <div class="form-group">
                <label class="label-text" for="language-select" data-i18n="setting.account.language"></label>
                <select id="language-select" class="input-field select-field">
                    <option value="en">English (Default)</option>
                    <option value="zh">简体中文 (Chinese)</option>
                </select>
                <small class="form-hint" data-i18n="setting.account.language_hint"></small>
            </div>

            <div class="full-width">
                <h3 class="mt-20" data-i18n="setting.account.security_title"></h3>
            </div>
            <div class="form-group">
                <label class="label-text" for="username" data-i18n="setting.account.username"></label>
                <input type="text" id="username" class="input-field" placeholder="" data-i18n-placeholder="setting.account.username_placeholder" autocomplete="off">
            </div>
            <div class="form-group">
                <!-- 占位，保持网格布局 -->
            </div>
            <div class="form-group">
                <label class="label-text" for="password" data-i18n="setting.account.password"></label>
                <input type="password" id="password" class="input-field" placeholder="" data-i18n-placeholder="setting.account.password_placeholder" autocomplete="new-password">
            </div>
            <div class="form-group">
                <label class="label-text" for="confirm-password" data-i18n="setting.account.confirm_password"></label>
                <input type="password" id="confirm-password" class="input-field" placeholder="" data-i18n-placeholder="setting.account.confirm_password_placeholder" autocomplete="new-password">
            </div>
        </div>
    </div>
</main>

<!-- 引入多语言资源包 -->
<script src="../common/i18n/zh.js"></script>
<script src="../common/i18n/en.js"></script>
<script src="../common/i18n/i18n_utils.js"></script>

<!-- 引入公用脚本 -->
<script src="../common/common.js"></script>
<script src="../common/request.js"></script>
<script src="../common/ui_components.js"></script>
<script src="../common/toast.js"></script>
<script src="../common/header_toolbar/default/default_header_toolbar.js"></script>
<script src="../common/widget/progress_button.js"></script>
<!-- 引入页面逻辑 -->
<script src="setting.js"></script>
<script src="setting_request.js"></script>
</body>
</html>
