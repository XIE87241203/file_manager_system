<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="batch_check.title"></title>
    <!-- 引入公用样式 -->
    <link rel="stylesheet" href="../../../common/common.css">
    <link rel="stylesheet" href="../../../common/table.css">
    <link rel="stylesheet" href="../../../common/header_toolbar/default/default_header_toolbar.css">
    <!-- 引入页面私有样式 -->
    <link rel="stylesheet" href="batch_check_results.css">
</head>
<body>
    <!-- 顶部工具栏：由 JS 动态初始化 -->
    <header class="header-bar"></header>

    <main class="main-content">
        <div id="repo-main-content" class="repo-content-group">
            <!-- 结果列表上方的工具栏 -->
            <div class="results-header-toolbar">
                <div class="toolbar-left">
                    <span class="stat-info" id="stat-info-container">
                        <!-- 由 JS 动态渲染多语言文案 -->
                    </span>
                </div>
                <div class="toolbar-right">
                    <button id="btn-select-all-new" class="btn-primary-large" data-i18n="batch_check.select_all_new"></button>
                </div>
            </div>

            <!-- 数据展示区：自适应表格 -->
            <div class="table-wrapper">
                <table id="file-table" class="file-table">
                    <thead>
                        <tr>
                            <th class="col-index" data-i18n="common.index"></th>
                            <th class="sortable col-name" data-field="name">
                                <span data-i18n="batch_check.col_name"></span>
                                <span class="sort-icon"></span>
                            </th>
                            <th class="sortable col-status" data-field="source">
                                <span data-i18n="batch_check.col_status"></span>
                                <span class="sort-icon"></span>
                            </th>
                            <th class="col-check">
                                <input type="checkbox" id="select-all-checkbox" class="select-all-checkbox">
                            </th>
                        </tr>
                    </thead>
                    <tbody id="results-list-body">
                        <!-- 数据行由 JS 动态生成 -->
                    </tbody>
                </table>
            </div>

            <!-- 底部导航区：操作 -->
            <footer class="footer-bar">
                <div class="footer-center-buttons">
                    <button id="btn-copy-selected" class="btn-secondary-large hidden" data-i18n="batch_check.copy_selected"></button>
                    <button id="btn-confirm-import" class="btn-primary-large hidden" data-i18n="batch_check.confirm_import"></button>
                </div>
            </footer>
        </div>
    </main>

    <!-- 脚本加载 -->
    <script src="../../../common/i18n/zh.js"></script>
    <script src="../../../common/i18n/en.js"></script>
    <script src="../../../common/i18n/i18n_utils.js"></script>
    <script src="../../../common/header_toolbar/default/default_header_toolbar.js"></script>
    <script src="../../../common/ui_components.js"></script>
    <script src="../../../common/request.js"></script>
    <script src="../../../common/toast.js"></script>
    <script src="batch_check_results_request.js"></script>
    <script src="batch_check_results.js"></script>
</body>
</html>
