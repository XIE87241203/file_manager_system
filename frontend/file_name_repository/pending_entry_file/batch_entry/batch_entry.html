<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="batch_check.entry_title"></title>
    <!-- 引入公用样式 -->
    <link rel="stylesheet" href="../../../common/common.css">
    <link rel="stylesheet" href="../../../common/table.css">
    <link rel="stylesheet" href="../../../common/header_toolbar/default/default_header_toolbar.css">
    <!-- 引入页面私有样式 -->
    <link rel="stylesheet" href="batch_entry.css">
</head>
<body>
    <!-- 顶部工具栏：由 HeaderToolbar.init 动态渲染 -->
    <header class="header-bar"></header>

    <main class="main-content">
        <div id="repo-main-content" class="repo-content-group">
            <!-- 批量输入区 -->
            <section class="batch-input-section">
                <div class="section-header">
                    <h3 class="section-header-title"><i class="icon-edit"></i> <span data-i18n="batch_check.input_title"></span></h3>
                    <span class="section-header-hint" data-i18n="batch_check.input_hint"></span>
                </div>
                <textarea id="batch-input-area" class="batch-input-area" data-i18n-placeholder="batch_check.input_placeholder"></textarea>
                <div class="action-bar">
                    <button id="btn-check-batch" class="btn-primary" data-i18n="batch_check.btn_check"></button>
                    <button id="btn-clear-input" class="btn-secondary" data-i18n="batch_check.btn_clear"></button>
                </div>
            </section>

            <!-- 检测结果展示区 (初始隐藏) -->
            <section id="check-results-section" class="results-section hidden">
                <div class="result-summary">
                    <div class="summary-item summary-item-exist"><span data-i18n="batch_check.summary_exists"></span><span id="count-exists">0</span></div>
                    <div class="summary-item summary-item-new"><span data-i18n="batch_check.summary_new"></span><span id="count-new">0</span></div>
                </div>

                <div class="result-columns">
                    <div class="result-column">
                        <h4 class="result-column-title" data-i18n="batch_check.exists_title"></h4>
                        <div class="table-wrapper mini-table">
                            <table class="file-table">
                                <thead>
                                    <tr>
                                        <th data-i18n="batch_check.col_name"></th>
                                        <th data-i18n="batch_check.col_status"></th>
                                    </tr>
                                </thead>
                                <tbody id="exists-list-body"></tbody>
                            </table>
                        </div>
                    </div>

                    <div class="result-column">
                        <h4 class="result-column-title" data-i18n="batch_check.new_title"></h4>
                        <div class="table-wrapper mini-table">
                            <table class="file-table">
                                <thead>
                                    <tr>
                                        <th data-i18n="batch_check.col_name"></th>
                                    </tr>
                                </thead>
                                <tbody id="new-list-body"></tbody>
                            </table>
                        </div>
                        <div class="column-footer">
                            <button id="btn-confirm-save" class="btn-primary hidden" data-i18n="batch_check.btn_confirm_save"></button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- 脚本加载 -->
    <script src="../../../common/i18n/zh.js"></script>
    <script src="../../../common/i18n/en.js"></script>
    <script src="../../../common/i18n/i18n_utils.js"></script>
    <script src="../../../common/ui_components.js"></script>
    <script src="../../../common/request.js"></script>
    <script src="../../../common/toast.js"></script>
    <script src="../../../common/header_toolbar/default/default_header_toolbar.js"></script>
    <script src="batch_entry_request.js"></script>
    <script src="batch_entry.js"></script>
</body>
</html>
