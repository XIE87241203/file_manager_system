<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="logs.title"></title>
    <link rel="stylesheet" href="../../common/common.css">
    <link rel="stylesheet" href="../../common/header_toolbar/default/default_header_toolbar.css">
    <link rel="stylesheet" href="logs.css">
</head>
<body>
    <!-- 顶部工具栏由 default_header_toolbar.js 动态初始化 -->
    <header class="header-bar"></header>

    <main class="main-content">
        <!-- 日志控制栏 -->
        <div class="log-controls">
            <div class="control-item">
                <label for="refresh-interval" data-i18n="logs.refresh_label"></label>
                <input type="number" id="refresh-interval" value="3" min="1" max="60">
            </div>
            <div class="control-item">
                <label for="log-lines" data-i18n="logs.lines_label"></label>
                <select id="log-lines">
                    <option value="100">100</option>
                    <option value="200" selected>200</option>
                    <option value="500">500</option>
                    <option value="1000">1000</option>
                </select>
            </div>
            <div class="control-item">
                <label for="log-level" data-i18n="logs.level_label"></label>
                <select id="log-level">
                    <option value="ALL" data-i18n="logs.level_all"></option>
                    <option value="DEBUG">DEBUG</option>
                    <option value="INFO">INFO</option>
                    <option value="ERROR">ERROR</option>
                </select>
            </div>
            <div class="control-item">
                <label class="checkbox-label">
                    <input type="checkbox" id="exclude-api" checked> <span data-i18n="logs.exclude_api"></span>
                </label>
            </div>
            <div class="control-item keyword-container">
                <input type="text" id="log-keyword" class="input-field" placeholder="" data-i18n-placeholder="logs.keyword_placeholder">
            </div>
            <div class="control-item">
                <button id="btn-toggle-auto" class="right-btn"></button>
                <button id="btn-manual-refresh" class="right-btn" data-i18n="logs.refresh_now"></button>
            </div>
            <div id="status-text" class="status-text"></div>
        </div>

        <!-- 日志内容展示区 -->
        <div id="log-viewer" class="log-viewer">
            <div class="log-content" id="log-content">
                <!-- 日志行将通过 JS 动态插入 -->
            </div>
        </div>
    </main>

    <!-- 引入多语言资源包 -->
    <script src="../../common/i18n/zh.js"></script>
    <script src="../../common/i18n/en.js"></script>
    <script src="../../common/i18n/i18n_utils.js"></script>

    <!-- 引入公用工具 -->
    <script src="../../common/ui_components.js"></script>
    <script src="../../common/request.js"></script>
    <script src="../../common/toast.js"></script>
    <script src="../../common/header_toolbar/default/default_header_toolbar.js"></script>
    <script src="logs_request.js"></script>
    <script src="logs.js"></script>
</body>
</html>
